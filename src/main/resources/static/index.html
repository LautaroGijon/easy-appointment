<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Easy Appointment</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">

    <main class="auth-container">
        <section class="auth-card">
            <h1 class="brand-title">Easy Appointment</h1>
            <h2>Iniciar sesión</h2>
            <p class="auth-subtitle">Ingresa tus credenciales para continuar</p>

            <form id="loginForm" class="auth-form">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="tu@ejemplo.com" required>

                <label for="loginPassword">Contraseña</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>

                <p id="loginMessage" class="auth-message"></p>

                <button type="submit" class="primary-button">Ingresar</button>
            </form>

            <p class="auth-link">
                ¿No tenés cuenta?
                <a href="register.html">Registrarse</a>
            </p>
        </section>
    </main>

    <script src="auth.js"></script>
</body>
</html>
